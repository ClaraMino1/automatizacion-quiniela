services:
  - type: web
    name: generador-imagenes
    env: python
    buildCommand: |
      apt-get update && \
      apt-get install -y wget unzip xvfb libxi6 libgconf-2-4 libnss3-dev libxss1 libappindicator1 libindicator7 libgbm-dev && \
      wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb && \
      dpkg -i google-chrome-stable_current_amd64.deb || apt-get -f install -y && \
      pip install -r requirements.txt && \
      wget -N https://chromedriver.storage.googleapis.com/114.0.5735.90/chromedriver_linux64.zip && \
      unzip chromedriver_linux64.zip && \
      mv chromedriver /usr/bin/chromedriver && \
      chmod +x /usr/bin/chromedriver
    startCommand: python app.py
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
