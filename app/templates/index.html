<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generar Imagen</title>
</head>
<body>
    <h1>Selecciona un horario</h1>
    
    <form action="{{ url_for('main.generar') }}" method="post">
        <select name="horario">
            {% for h in horarios %}
                <option value="{{h}}">{{h}}</option>
            {% endfor %}
        </select>
        <button type="submit">Generar Imagen</button>
    </form>
</body>
</html>
