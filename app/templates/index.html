{% extends "base.html" %}

{% block content %}
<div class="card p-4">
    <h1 class="text-center mb-4">Generador de Resultados Quiniela</h1>
    <form action="{{ url_for('generar') }}" method="post">
        <div class="mb-4">
            <label for="horario" class="form-label">Seleccione el horario:</label>
            <select name="horario" id="horario" class="form-select" required>
                <option value="">Seleccione un horario...</option>
                {% for horario in horarios %}
                <option value="{{ horario }}">{{ horario }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary">Generar Resultado</button>
        </div>
    </form>
</div>
{% endblock %}
