<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resultados Quiniela</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f9; text-align: center; padding: 20px; }
    .buttons { margin: 30px 0; }
    form { display: inline-block; margin: 0 10px; }
    select, button { padding: 10px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>Resultados Quiniela</h1>
  <div class="buttons">
    <form action="/resultados_dia" method="post">
      <button type="submit">Generar Resultados del Día</button>
    </form>

    <form action="/resultados_horario" method="post">
      <label for="horario">Elige un horario:</label>
      <select name="horario" id="horario" required>
        <option value="">-- Seleccionar --</option>
        <option value="LA PREVIA">La Previa</option>
        <option value="EL PRIMERO">El Primero</option>
        <option value="MATUTINA">Matutina</option>
        <option value="VESPERTINA">Vespertina</option>
        <option value="NOCTURNA">Nocturna</option>
      </select>
      <button type="submit">Generar por Horario</button>
    </form>
  </div>
</body>
</html>
