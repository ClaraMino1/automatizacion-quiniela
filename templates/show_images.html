<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resultado por Horario</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
    .grid { display: flex; justify-content: center; margin-top: 20px; }
    .item { background: #fff; padding: 10px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    img { max-width: 300px; height: auto; display: block; margin: 0 auto; }
    a { display: block; margin-top: 10px; color: #3498db; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Resultado del Horario Seleccionado</h1>
  <div class="grid">
    {% for img in imagenes %}
      <div class="item">
        <img src="{{ url_for('static', filename=img) }}" alt="Resultado Horario">
        <a href="{{ url_for('static', filename=img) }}" download>Descargar</a>
      </div>
    {% endfor %}
  </div>
  <p><a href="{{ url_for('index') }}">Volver al inicio</a></p>
</body>
</html>
